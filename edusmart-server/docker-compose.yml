services:
  mysql:
    image: mysql:8.4
    container_name: edusmart-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edusmart
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    volumes:
      - edusmart_mysql_data:/var/lib/mysql

volumes:
  edusmart_mysql_data:

