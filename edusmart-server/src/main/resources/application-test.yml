# 本地/CI 无 MySQL 时使用：--spring.profiles.active=test
spring:
  datasource:
    url: jdbc:h2:mem:edusmarttest;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long!!
  expiration-ms: 3600000
