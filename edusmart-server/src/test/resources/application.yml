# 与 src/main/resources/application-test.yml 对齐；运行 @SpringBootTest 时可覆盖数据源
spring:
  datasource:
    url: jdbc:h2:mem:edusmarttest;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: test-secret-key-must-be-at-least-32-bytes-long!!
  expiration-ms: 3600000
